mode: resolve-ping # 可选: resolve-ping / dns-ping
attempts: 2 # 最大错误重试次数，会保留最后一次成功的结果
timeout: 1s # DNS 查询超时时间
dns:
  record_types:
    - A # 可选: A / AAAA；默认只查 A 记录，保持旧行为
benchmark:
  rounds: 3 # 正式测试轮数；1 接近旧版单轮行为
  warmup: 1 # 预热轮数，不计入统计
  score:
    dns_weight: 0.3
    ping_weight: 0.6
    success_weight: 0.1
concurrency:
  servers: 4 # DNS 服务器并发数
  domains: 16 # 每个 DNS 服务器内的域名并发数
  pings: 32 # Ping 目标全局并发数
geoip:
  enabled: true # 开启后为解析 IP 和 Ping 目标标注地理位置与 ASN
  provider: ip2location
  database_path: ./IP2LOCATION-LITE-DB11.BIN
  asn_database_path: ./IP2LOCATION-LITE-ASN.BIN
ping:
  count: 3
  interval: 100ms
  timeout: 2s
  privileged: false # 默认使用非特权 ping，避免普通用户缺少 raw ICMP 权限
  ip_selection: all # 可选: all / first；first 用于模拟只使用首个解析 IP
  ip_family: ipv4 # 可选: ipv4 / ipv6 / dual；默认只 ping IPv4
output:
  format: html # 可选: excel / html / json
  path: .
dns_servers:
  - "udp://123.123.123.123"
  - "udp://119.29.29.29"
  - "udp://223.5.5.5"
  - "udp://180.76.76.76"
  - "udp://8.8.8.8"
  - "udp://114.114.114.114"

  - "tls://dns.alidns.com"
  - "tls://dns.pub"
  - "tls://dns.google"

  - "https://dns.google/dns-query"
  - "https://cloudflare-dns.com/dns-query"

